    const PHASES = {
      menstrual: { name:"Menstrual", emoji:"🌑", color:"#C2185B", bg:"#FCE4EC", days:"Days 1–5", description:"Your period. Hormones are at their lowest.", energy:"Low", workouts:["Gentle yoga","Walking","Stretching","Light pilates"], tips:"Listen to your body — rest is productive. Lower intensity is key. Iron-rich foods help replenish.", avoid:"Heavy lifting, HIIT, intense cardio" },
      follicular: { name:"Follicular", emoji:"🌒", color:"#7B1FA2", bg:"#F3E5F5", days:"Days 6–13", description:"Estrogen rises as follicles develop. Energy is building.", energy:"Building → High", workouts:["Strength training","Running","Cycling","Dance classes","HIIT"], tips:"Great time to try new workouts or push heavier weights. Coordination and endurance improve.", avoid:"Nothing — take advantage of this phase!" },

    const ENERGY_LEVELS = ["⚡️⚡️⚡️","⚡️⚡️","⚡️","😴"];

    function toDateKey(date) {
      const d = new Date(date);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

    function getDayOfCycle(lastPeriodStart, cycleLength) {
      const start = new Date(lastPeriodStart);
      const today = new Date();
      // Predicted next period
const predictedStart = new Date(lastPeriod + "T00:00:00");
predictedStart.setDate(predictedStart.getDate() + cycleLength);

// Predicted period lasts 5 days
const predictedDays = [];

for (let i = 0; i < 5; i++) {
  const d = new Date(predictedStart);
  d.setDate(d.getDate() + i);

  predictedDays.push(
    `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`
  );
}

// Ovulation is approximately 14 days before the next predicted period
const ovulationDate = new Date(predictedStart);
ovulationDate.setDate(ovulationDate.getDate() - 14);

const ovulationKey =
  `${ovulationDate.getFullYear()}-${String(ovulationDate.getMonth()+1).padStart(2,"0")}-${String(ovulationDate.getDate()).padStart(2,"0")}`;

// Fertile window = 5 days before ovulation + ovulation day
const fertileDays = [];

for (let i = -5; i <= 0; i++) {

  const d = new Date(ovulationDate);
  d.setDate(d.getDate() + i);

  fertileDays.push(
    `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`
  );

}
      
      today.setHours(0,0,0,0); start.setHours(0,0,0,0);
      const diffDays = Math.floor((today - start) / 86400000);
      return Math.max(1, (diffDays % cycleLength) + 1);
    }

    function getPhase(day, cycleLength) {
      if (day <= 5) return "menstrual";
      if (day <= Math.round(cycleLength * 0.46)) return "follicular";
      if (day <= Math.round(cycleLength * 0.57)) return "ovulation";
      return "luteal";
    }

    function formatDate(dateStr) {
      const d = new Date(dateStr + "T00:00:00");
      return d.toLocaleDateString("en-ZA", { day:"numeric", month:"short", year:"numeric" });
    }

    function CycleWheel({ currentDay, cycleLength }) {
      const cx=110,cy=110,r=80;
      const phaseColors=["#C2185B","#7B1FA2","#F57F17","#2E7D32"];
      const phaseLengths=[5,cycleLength*0.46-5,cycleLength*0.57-cycleLength*0.46,cycleLength-cycleLength*0.57];
      const segments=[]; let startAngle=-90;
      phaseLengths.forEach((len,i)=>{
        const sweep=(len/cycleLength)*360, endAngle=startAngle+sweep;
        const s=startAngle*Math.PI/180, e=endAngle*Math.PI/180;
        const x1=cx+r*Math.cos(s),y1=cy+r*Math.sin(s),x2=cx+r*Math.cos(e),y2=cy+r*Math.sin(e);
        segments.push({d:`M${cx},${cy} L${x1},${y1} A${r},${r},0,${sweep>180?1:0},1,${x2},${y2} Z`,color:phaseColors[i]});
        startAngle=endAngle;
      });
      const dotAngle=(((currentDay-1)/cycleLength)*360-90)*Math.PI/180;
      const dotX=cx+(r-14)*Math.cos(dotAngle),dotY=cy+(r-14)*Math.sin(dotAngle);
      return (
        <div style={{display:"flex",justifyContent:"center",margin:"0 0 20px"}}>
          <svg width={220} height={220}>
            {segments.map((seg,i)=><path key={i} d={seg.d} fill={seg.color} opacity={0.85}/>)}
            <circle cx={cx} cy={cy} r={46} fill="#fff"/>
            <text x={cx} y={cy-8} textAnchor="middle" fontSize={13} fill="#444" fontWeight={600}>Day</text>
            <text x={cx} y={cy+14} textAnchor="middle" fontSize={28} fill="#222" fontWeight={800}>{currentDay}</text>
            <text x={cx} y={cy+30} textAnchor="middle" fontSize={11} fill="#999">of {cycleLength}</text>
            <circle cx={dotX} cy={dotY} r={9} fill="#fff" stroke="#333" strokeWidth={2.5}/>
          </svg>
        </div>
      );
    }

    function PhaseCard({ phaseKey, active, day }) {
      const phase = PHASES[phaseKey];
      return (

          </>}
        </div>
      );
    }

function TodayTab({
  logs,
  setLogs,
  currentPhase,
  cycleLength,
  selectedLogDate,
  setSelectedLogDate
}) {

  const log = logs[selectedLogDate] || {};

  function update(field, value) {
    setLogs(prev => ({
      ...prev,
      [selectedLogDate]: {
        ...prev[selectedLogDate],
        [field]: value
      }
    }));
  }

  function toggleSymptom(s) {
    const current = log.symptoms || [];
    const next = current.includes(s)
      ? current.filter(x => x !== s)
      : [...current, s];

    update("symptoms", next);
  }

  function toggleFlow(level) {
    update("flow", log.flow === level ? null : level);
  }

  const phase = PHASES[currentPhase];

          <div style={{background:"#fff",borderRadius:14,border:"1px solid #eee",padding:16,marginBottom:14}}>

function CalendarTab({
  logs,
  selectedLogDate,
  setSelectedLogDate,
  setActiveTab,
  lastPeriod,
  cycleLength
}) {

  const [displayDate, setDisplayDate] = React.useState(new Date());

  const year = displayDate.getFullYear();
  const month = displayDate.getMonth();

  const monthName = displayDate.toLocaleString("default", {
    month: "long"
  });

  const weekdays = ["Mon","Tue","Wed","Thu","Fri","Sat","Sun"];

  const today = new Date();

  const firstDay = new Date(year, month, 1);
  const daysInMonth = new Date(year, month + 1, 0).getDate();

  let startDay = firstDay.getDay();
  startDay = startDay === 0 ? 6 : startDay - 1;

  const calendarDays = [];

  for (let i = 0; i < startDay; i++) {
    calendarDays.push(null);
  }

  for (let d = 1; d <= daysInMonth; d++) {
    calendarDays.push(d);
  }

  function openDay(day) {

    if (!day) return;

    const key =
      `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

    setSelectedLogDate(key);
    setActiveTab("today");
  }

  return (

    <div
      style={{
        background:"#fff",
        borderRadius:14,
        border:"1px solid #eee",
        padding:20
      }}
    >

      {/* Header */}

      <div
        style={{
          display:"flex",
          justifyContent:"space-between",
          alignItems:"center",
          marginBottom:20
        }}
      >

        <button
          onClick={() => setDisplayDate(new Date(year, month-1, 1))}
          style={{
            background:"none",
            border:"none",
            fontSize:22,
            cursor:"pointer"
          }}
        >
          ◀
        </button>

        <h2>
          🌸 {monthName} {year}
        </h2>

        <button
          onClick={() => setDisplayDate(new Date(year, month+1, 1))}
          style={{
            background:"none",
            border:"none",
            fontSize:22,
            cursor:"pointer"
          }}
        >
          ▶
        </button>

      </div>

      {/* Weekdays */}

      <div
        style={{
          display:"grid",
          gridTemplateColumns:"repeat(7,1fr)",
          gap:8,
          textAlign:"center",
          marginBottom:8
        }}
      >

        {weekdays.map(day=>

          <div
            key={day}
            style={{
              fontWeight:700,
              fontSize:13,
              color:"#777"
            }}
          >
            {day}
          </div>

        )}

      </div>

      {/* Calendar */}

      <div
        style={{
          display:"grid",
          gridTemplateColumns:"repeat(7,1fr)",
          gap:8
        }}
      >

        {calendarDays.map((day,index)=>{

          if(day===null){

            return <div key={index}></div>;

          }

          const key =
            `${year}-${String(month+1).padStart(2,"0")}-${String(day).padStart(2,"0")}`;

          const log = logs[key];

          const isToday =
            today.getFullYear()===year &&
            today.getMonth()===month &&
            today.getDate()===day;

          const isSelected =
            key===selectedLogDate;
        const isPredictedPeriod = predictedDays.includes(key);
        
        const isOvulation = key === ovulationKey;
        
        const isFertile = fertileDays.includes(key);

          return(

            <div
              key={index}
              onClick={()=>openDay(day)}
              style={{
                height:55,
                borderRadius:10,
                cursor:"pointer",
               background:
                isSelected
                  ? "#E1BEE7"
                  : isToday
                  ? "#F8BBD0"
                  : isOvulation
                  ? "#FFE082"
                  : isFertile
                  ? "#E8F5E9"
                  : isPredictedPeriod
                  ? "#FCE4EC"
                  : "#fafafa",

                  isToday
                    ? "2px solid #C2185B"
                    : "1px solid #eee",

                justifyContent:"center",

)}

{log.energy != null && (

              }}
            />
            <span style={{fontSize:13}}>Today</span>
          </div>

          {/* Selected */}

          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <div
              style={{
                width:18,
                height:18,
                borderRadius:5,
                background:"#E1BEE7",
                border:"1px solid #CE93D8"
              }}
            />
            <span style={{fontSize:13}}>Selected Day</span>
          </div>

          {/* Logged Data */}

          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>🩸 😊 ⚡ 🤒 📝</span>
            <span style={{fontSize:13}}>Logged Data</span>
          </div>

        </div>

      </div>

      {selectedLogDate && logs[selectedLogDate] && (

        <div
          style={{
            marginTop:24,
            padding:16,
            borderRadius:12,
            background:"#fafafa",
            border:"1px solid #eee"
          }}
        >

          <h3 style={{marginBottom:12}}>
            📅 {formatDate(selectedLogDate)}
          </h3>

          {logs[selectedLogDate].flow!=null &&
            <p>
              🩸 {FLOW_LEVELS[logs[selectedLogDate].flow].label}
            </p>
          }

          {logs[selectedLogDate].mood &&
            <p>
              😊 {logs[selectedLogDate].mood}
            </p>
          }

          {logs[selectedLogDate].energy!=null &&
            <p>
              ⚡ {ENERGY_LEVELS[logs[selectedLogDate].energy]}
            </p>
          }

          {logs[selectedLogDate].symptoms?.length>0 &&
            <p>
              🤒 {logs[selectedLogDate].symptoms.join(", ")}
            </p>
          }

          {logs[selectedLogDate].notes &&
            <p>
              📝 {logs[selectedLogDate].notes}
            </p>
          }

        </div>

      )}

    </div>

  );

}
    
    function HistoryTab({ logs, lastPeriod, cycleLength }) {
      const entries = Object.entries(logs)
        .filter(([,v]) => v && (v.flow!=null||v.mood||v.symptoms?.length||v.energy!=null||v.notes))
        .sort(([a],[b]) => b.localeCompare(a))
        .slice(0, 60);

      if (entries.length === 0) {
        return (
          <div style={{textAlign:"center",padding:"60px 20px",color:"#bbb"}}>
            <div style={{fontSize:40,marginBottom:12}}>📋</div>
            <div style={{fontSize:15,fontWeight:600,marginBottom:8,color:"#999"}}>No history yet</div>
            <div style={{fontSize:13}}>Start logging on the Today tab and it'll show up here</div>
          </div>
        );
      }

      return (
        <div>
          {entries.map(([dateKey, log]) => {
            const start = new Date(lastPeriod);
            const entry = new Date(dateKey + "T00:00:00");
            start.setHours(0,0,0,0); entry.setHours(0,0,0,0);
            const diffDays = Math.floor((entry - start) / 86400000);
            const cycleDay = Math.max(1, (diffDays % cycleLength) + 1);
            const phase = getPhase(cycleDay, cycleLength);
            const phaseInfo = PHASES[phase];

            return (
              <div key={dateKey} style={{background:"#fff",borderRadius:14,border:"1px solid #eee",padding:16,marginBottom:12}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:10}}>
                  <div>
                    <div style={{fontSize:14,fontWeight:700,color:"#222"}}>{formatDate(dateKey)}</div>
                    <div style={{fontSize:12,color:phaseInfo.color,fontWeight:600,marginTop:2}}>{phaseInfo.emoji} {phaseInfo.name} · Day {cycleDay}</div>
                  </div>
                  <div style={{display:"flex",gap:6,alignItems:"center"}}>
                    {log.mood && <span style={{fontSize:22}}>{log.mood}</span>}
                    {log.energy!=null && <span style={{fontSize:14}}>{ENERGY_LEVELS[log.energy]}</span>}
                  </div>
                </div>

                {log.flow != null && (
                  <div style={{fontSize:13,color:"#C2185B",marginBottom:6,fontWeight:600}}>
                    {FLOW_LEVELS[log.flow].emoji} {FLOW_LEVELS[log.flow].label} flow
                  </div>
                )}

                {log.symptoms?.length > 0 && (
                  <div style={{display:"flex",flexWrap:"wrap",gap:4,marginBottom:6}}>
                    {log.symptoms.map(s=>(
                      <span key={s} style={{fontSize:11,padding:"3px 8px",borderRadius:20,background:"#FCE4EC",color:"#C2185B",fontWeight:600}}>{s}</span>
                    ))}
                  </div>
                )}

                {log.notes && (
                  <div style={{fontSize:13,color:"#555",marginTop:6,lineHeight:1.5,fontStyle:"italic"}}>"{log.notes}"</div>
                )}
              </div>
            );
          })}
        </div>
      );
    }

    function App() {
      const [lastPeriod, setLastPeriod] = useState("2026-06-09");
      const [cycleLength, setCycleLength] = useState(28);
      const [showSettings, setShowSettings] = useState(false);
      const [saveStatus, setSaveStatus] = useState(null);
      const [loaded, setLoaded] = useState(false);
      const [activeTab, setActiveTab] = useState("home");

      const [logs, setLogs] = useState({});
      
     const [selectedLogDate, setSelectedLogDate] = useState(
    toDateKey(new Date())
);

      useEffect(() => {
        try {
          const saved = localStorage.getItem(STORAGE_KEY);
          if (saved) {
            const data = JSON.parse(saved);
            if (data.lastPeriod) setLastPeriod(data.lastPeriod);
            if (data.cycleLength) setCycleLength(data.cycleLength);
            if (data.logs) setLogs(data.logs);
          }
        } catch(e) {}
        setLoaded(true);
      }, []);

      useEffect(() => {
        if (!loaded) return;
        setSaveStatus("saving");
        const t = setTimeout(() => {
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify({ lastPeriod, cycleLength, logs }));
            setSaveStatus("saved");
            setTimeout(() => setSaveStatus(null), 2000);
          } catch(e) { setSaveStatus("error"); }
        }, 600);
        return () => clearTimeout(t);
      }, [lastPeriod, cycleLength, logs, loaded]);

      const day = getDayOfCycle(lastPeriod, cycleLength);
      const currentPhase = getPhase(day, cycleLength);
      const nextPeriod = new Date(lastPeriod);
      nextPeriod.setDate(nextPeriod.getDate() + cycleLength);
      const daysUntilNext = Math.ceil((nextPeriod - new Date()) / 86400000);

      if (!loaded) return <div style={{display:"flex",alignItems:"center",justifyContent:"center",minHeight:"100vh",color:"#999",fontSize:14}}>Loading…</div>;

      const tabs = [
        { key:"home", label:"🏠 Home" },
        { key:"today", label:"📝 Log Today" },
        { key:"calendar", label:"📅 Calendar" },
        { key:"history", label:"📋 History" },
      ];

      return (
        <div style={{maxWidth:480,margin:"0 auto",fontFamily:"'Inter',system-ui,sans-serif",background:"#fafafa",minHeight:"100vh"}}>

          {/* Header */}
          <div style={{padding:"24px 16px 0",display:"flex",alignItems:"flex-start",justifyContent:"space-between"}}>
            <div>
              <h1 style={{margin:0,fontSize:22,fontWeight:800,color:"#1a1a1a"}}>CycleTrack 🌸</h1>
              <p style={{margin:"4px 0 0",fontSize:14,color:"#888"}}>Optimize your training with your cycle</p>
            </div>
            <div style={{fontSize:12,marginTop:4,minWidth:60,textAlign:"right"}}>
              {saveStatus==="saving"&&<span style={{color:"#bbb"}}>Saving…</span>}
              {saveStatus==="saved"&&<span style={{color:"#4CAF50"}}>✓ Saved</span>}
              {saveStatus==="error"&&<span style={{color:"#f44336"}}>Save failed</span>}
            </div>
          </div>

          {/* Tabs */}
          <div style={{display:"flex",borderBottom:"1px solid #eee",margin:"16px 0 0",background:"#fff",position:"sticky",top:0,zIndex:10}}>
            {tabs.map(t=>(
              <button key={t.key} className={`tab-btn${activeTab===t.key?" active":""}`} onClick={()=>setActiveTab(t.key)}>{t.label}</button>
            ))}
          </div>

          <div style={{padding:"16px 16px 32px"}}>

            {/* HOME TAB */}
            {activeTab==="home" && <>
              <CycleWheel currentDay={day} cycleLength={cycleLength}/>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:20}}>
                <div style={{background:"#fff",borderRadius:12,padding:14,border:"1px solid #eee"}}>
                  <div style={{fontSize:12,color:"#999",marginBottom:4}}>Current phase</div>
                  <div style={{fontSize:16,fontWeight:700,color:PHASES[currentPhase].color}}>{PHASES[currentPhase].emoji} {PHASES[currentPhase].name}</div>
                </div>
                <div style={{background:"#fff",borderRadius:12,padding:14,border:"1px solid #eee"}}>
                  <div style={{fontSize:12,color:"#999",marginBottom:4}}>Next period</div>
                  <div style={{fontSize:16,fontWeight:700,color:"#1a1a1a"}}>{daysUntilNext<=0?"Any day now":`In ${daysUntilNext} days`}</div>
                </div>
              </div>
              <div style={{marginBottom:16}}>
                {["menstrual","follicular","ovulation","luteal"].map(p=>(
                  <PhaseCard key={p} phaseKey={p} active={currentPhase===p} day={day}/>
                ))}
              </div>
              <div style={{background:"#fff",borderRadius:14,border:"1px solid #eee",overflow:"hidden",marginBottom:16}}>
                <button onClick={()=>setShowSettings(!showSettings)} style={{width:"100%",padding:"14px 16px",background:"none",border:"none",display:"flex",justifyContent:"space-between",alignItems:"center",cursor:"pointer",fontSize:14,fontWeight:600,color:"#444"}}>
                  <span>⚙️ Adjust your cycle dates</span>
                  <span>{showSettings?"▲":"▼"}</span>
                </button>
                {showSettings&&(
                  <div style={{padding:"0 16px 16px",borderTop:"1px solid #f0f0f0"}}>
                    <div style={{marginTop:14,marginBottom:12}}>
                      <label style={{fontSize:13,color:"#666",display:"block",marginBottom:6}}>First day of last period</label>
                      <input type="date" value={lastPeriod} onChange={e=>setLastPeriod(e.target.value)}
                        style={{width:"100%",padding:"10px 12px",borderRadius:8,border:"1.5px solid #ddd",fontSize:15,background:"#fafafa",boxSizing:"border-box"}}/>
                    </div>
                    <div>
                      <label style={{fontSize:13,color:"#666",display:"block",marginBottom:6}}>Cycle length: <strong>{cycleLength} days</strong></label>
                      <input type="range" min={21} max={40} value={cycleLength} onChange={e=>setCycleLength(Number(e.target.value))}
                        style={{accentColor:PHASES[currentPhase].color}}/>
                      <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#bbb"}}><span>21 days</span><span>40 days</span></div>
                    </div>
                    <p style={{fontSize:12,color:"#aaa",marginTop:12,lineHeight:1.5}}>Changes save automatically to this device.</p>
                  </div>
                )}
              </div>
              <p style={{fontSize:11,color:"#bbb",textAlign:"center",lineHeight:1.6}}>General guide only, not medical advice. Everyone's cycle varies.</p>
            </>}

            {/* TODAY TAB */}
            {activeTab==="today" && <>
              <div style={{background:PHASES[currentPhase].bg,borderRadius:12,padding:"12px 16px",marginBottom:16,border:`1.5px solid ${PHASES[currentPhase].color}22`}}>
                <div style={{fontSize:13,color:PHASES[currentPhase].color,fontWeight:700}}>{PHASES[currentPhase].emoji} {PHASES[currentPhase].name} phase · Day {day}</div>
                <div style={{fontSize:12,color:"#666",marginTop:2}}>{new Date().toLocaleDateString("en-ZA",{weekday:"long",day:"numeric",month:"long"})}</div>
              </div>
             <TodayTab
                logs={logs}
                setLogs={setLogs}
                currentPhase={currentPhase}
                cycleLength={cycleLength}
                selectedLogDate={selectedLogDate}
                setSelectedLogDate={setSelectedLogDate}
              />
            </>}

           <CalendarTab
              logs={logs}
              selectedLogDate={selectedLogDate}
              setSelectedLogDate={setSelectedLogDate}
              setActiveTab={setActiveTab}
              lastPeriod={lastPeriod}
              cycleLength={cycleLength}
            />
            )}
            
            {/* HISTORY TAB */}
            {activeTab==="history" && <>
              <div style={{fontSize:13,color:"#999",marginBottom:16}}>Your last 60 logged days</div>
              <HistoryTab logs={logs} lastPeriod={lastPeriod} cycleLength={cycleLength}/>
            </>}

          </div>
        </div>
      );
    }

    ReactDOM.render(<App/>, document.getElementById("root"));
  </script>
</body>
</html>
